<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BetaZero</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

/* TOP BAR */
.topbar {
  height: 60px;
  background: #1b1b1b;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid #333;
}

.logo {
  color: #81b64c;
  font-size: 20px;
  font-weight: bold;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* LEFT */
.left {
  width: 220px;
  background: #171717;
  padding: 10px;
}

.item {
  padding: 12px;
  background: #222;
  margin-bottom: 10px;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #333;
}

/* BOARD */
.center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.board {
  width: 640px;
  height: 640px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  border: 4px solid #333;
}

.square {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 48px;
}

.light { background: #f0d9b5; }
.dark { background: #b58863; }

/* RIGHT PANEL */
.right {
  width: 300px;
  background: #171717;
  padding: 10px;
  border-left: 1px solid #333;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #81b64c;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #9bd66a;
}

.moves {
  font-family: monospace;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">BetaZero</div>
  <div>Play • Analyze • Engine</div>
</div>

<div class="container">

  <div class="left">
    <div class="item">Play AI</div>
    <div class="item">Analysis</div>
    <div class="item">Engine</div>
  </div>

  <div class="center">
    <div class="board" id="board"></div>
  </div>

  <div class="right">
    <h3>Engine Control</h3>

    <button onclick="getBestMove()">Get Best Move</button>
    <button onclick="newGame()">New Game</button>

    <div class="moves" id="moves">Moves will appear here...</div>
  </div>

</div>

<script>

// =========================
// BOARD
// =========================

const board = document.getElementById("board");

const pieces = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let position = [
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];

function renderBoard() {
  board.innerHTML = "";

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {

      const sq = document.createElement("div");
      sq.className = "square " + ((r+c)%2 ? "dark":"light");

      const p = position[r][c];
      sq.textContent = p ? pieces[p] : "";

      board.appendChild(sq);
    }
  }
}

renderBoard();

// =========================
// STOCKFISH API CALL
// =========================

async function getBestMove() {

  fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"

  try {
    const res = await fetch("https://chess-repo.onrender.com/bestmove", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fen: fen,
        skill: 10
      })
    });

    const data = await res.json();

    document.getElementById("moves").innerHTML =
      "Best Move: " + data.move;

    console.log("Stockfish:", data);

  } catch (err) {
    console.error("Error:", err);
    alert("Backend not connected!");
  }
}

// =========================
// RESET GAME
// =========================

function newGame() {
  renderBoard();
  document.getElementById("moves").innerHTML = "New game started";
}

</script>

</body>
</html>
